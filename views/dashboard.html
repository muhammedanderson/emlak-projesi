<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Piyasa Endeksli Değerleme Motoru</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 20px;
        }

        .container {
            background-color: white;
            width: 600px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        select,
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #218838;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2 style="color: #2c3e50; border-bottom: 2px solid #ddd; padding-bottom: 10px;">Gayrimenkul Değerleme Motoru
        </h2>
        <p style="color: #666;">Güncel piyasa veritabanı ile adil değer hesaplaması yapın.</p>

        <form action="/calculate" method="POST">

            <div class="form-group">
                <label>Şehir Seçimi (Veritabanından):</label>
                <select name="district" required>
                    <option value="İstanbul">İstanbul</option>
                    <option value="Ankara">Ankara</option>
                    <option value="İzmir">İzmir</option>
                    <option value="Bursa">Bursa</option>
                    <option value="Antalya">Antalya</option>
                    <option value="Adana">Adana</option>
                    <option value="Konya">Konya</option>
                    <option value="Şanlıurfa">Şanlıurfa</option>
                    <option value="Gaziantep">Gaziantep</option>
                    <option value="Kocaeli">Kocaeli</option>
                    <option value="Kastamonu">Kastamonu</option>
                    <option value="Mardin">Mardin</option>
                    <option value="Sinop">Sinop</option>
                </select>
            </div>

            <div class="form-group">
                <label>Konut Genişliği (m²):</label>
                <input type="number" name="sqm" placeholder="Örn: 90" required>
            </div>

            <div class="form-group">
                <label>Bina Yaşı:</label>
                <select name="age" required>
                    <option value="0-5">0 - 5 Yıl (Yeni Bina)</option>
                    <option value="6-15">6 - 15 Yıl Arası</option>
                    <option value="16+">16 Yıl ve Üzeri</option>
                </select>
            </div>

            <div class="form-group">
                <label>Ulaşım İmkanlarına Yakınlık:</label>
                <select name="transport" required>
                    <option value="yakin">Yürüme Mesafesinde (Metro/Metrobüs dibinde)</option>
                    <option value="uzak">Araç Mesafesinde</option>
                </select>
            </div>

            <input type="hidden" name="actionType" value="sadece_deger">

            <button type="submit" class="btn">Piyasa Analizini Başlat</button>
        </form>
    </div>
</body>

</html>
