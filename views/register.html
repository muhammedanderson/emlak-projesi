<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Hesap Oluştur | EmlakPazar</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #e0e6ed 0%, #f4f7f6 100%); height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card-container { background: #ffffff; padding: 35px 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; }
        .brand-section { text-align: center; margin-bottom: 25px; }
        .brand-title { font-size: 26px; font-weight: 800; color: #1e293b; margin-bottom: 6px; }
        .brand-slogan { color: #64748b; font-size: 14px; }
        .form-group { width: 100%; margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; color: #1e293b; font-weight: 600; font-size: 14px; }
        .form-control { width: 100%; padding: 12px 14px; border: 1px solid #e2e8f0; border-radius: 10px; background: #ffffff; color: #1e293b; font-size: 15px; outline: none; transition: all 0.2s ease; }
        .form-control:focus { border-color: #cbd5e1; box-shadow: 0 0 0 3px rgba(100, 116, 139, 0.1); }
        .checkbox-group { width: 100%; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 13px; color: #64748b; }
        .btn-register { width: 100%; padding: 14px; background-color: #15803d; color: #ffffff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-register::after { content: ' 🚀'; margin-left: 6px; }
        .btn-register:hover { background-color: #166534; }
        .switch-page-text { margin-top: 20px; font-size: 14px; color: #64748b; }
        .switch-page-link { color: #1d4ed8; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="brand-section">
            <div class="brand-title">Yeni Hesap Oluştur</div>
            <div class="brand-slogan">Hemen katılın, emlak pazarındaki fırsatları kaçırmayın.</div>
        </div>

        <form id="registerForm" style="width: 100%;">
            <div class="form-group">
                <label for="username">Kullanıcı Adı</label>
                <input type="text" id="username" class="form-control" placeholder="Örn: emrebalcan" required>
            </div>

            <div class="form-group">
                <label for="role">Üyelik Tipi (Rol)</label>
                <select id="role" class="form-control" required>
                    <option value="" disabled selected>Seçiniz...</option>
                    <option value="Bireysel Kullanıcı">Bireysel Kullanıcı (Maks 3 İlan)</option>
                    <option value="Emlak Ofisi / Danışman">Emlak Ofisi / Danışman (Sınırsız & Öne Çıkan)</option>
                </select>
            </div>

            <div class="form-group" id="companyGroup" style="display: none;">
                <label for="companyName">Firma / Acente İsmi</label>
                <input type="text" id="companyName" class="form-control" placeholder="Örn: Remax Müjde, Kuzey Emlak">
            </div>

            <div class="form-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" class="form-control" placeholder="********" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">Kullanım şartlarını kabul ediyorum.</label>
            </div>

            <button type="submit" class="btn-register">Hesabımı Oluştur ve Başla</button>
        </form>

        <div class="switch-page-text">
            Zaten üye misiniz? <a href="/login" class="switch-page-link">Giriş Yapın</a>
        </div>
    </div>

    <script>
        // Rol seçimine göre Firma adı alanını göster/gizle
        document.getElementById('role').addEventListener('change', function() {
            const companyGroup = document.getElementById('companyGroup');
            const companyInput = document.getElementById('companyName');
            if (this.value === 'Emlak Ofisi / Danışman') {
                companyGroup.style.display = 'block';
                companyInput.required = true;
            } else {
                companyGroup.style.display = 'none';
                companyInput.required = false;
                companyInput.value = '';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usernameInput = document.getElementById('username').value;
            const roleInput = document.getElementById('role').value;
            const passwordInput = document.getElementById('password').value;
            const companyNameInput = document.getElementById('companyName').value;

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: usernameInput,
                        role: roleInput,
                        password: passwordInput,
                        companyName: companyNameInput // Arka plana firma ismini yolluyoruz
                    })
                });

                const result = await response.json();
                if (response.ok) {
                    alert(result.message || 'Kayıt başarılı!');
                    window.location.href = result.redirectUrl || '/login';
                } else {
                    alert(result.message || 'Kayıt işlemi başarısız oldu.');
                }
            } catch (error) {
                alert('Sunucuyla iletişim kurulurken bir hata oluştu.');
            }
        });
    </script>
</body>
</html>
