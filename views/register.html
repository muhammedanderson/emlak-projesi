<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Hesap Oluştur | EmlakPazar</title>
    <style>
        /* Genel Sıfırlama (Login ile aynı) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0e6ed 0%, #f4f7f6 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Beyaz Kart Konteyneri (Login ile benzer, daha uzun içerik için padding ayarlı) */
        .card-container {
            background: #ffffff;
            padding: 45px 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 460px; /* Kayıt formu biraz daha geniş olabilir */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Başlık Alanı (image_8.png gibi) */
        .brand-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-logo {
            font-size: 28px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .brand-slogan {
            color: #64748b;
            font-size: 14px;
            font-weight: 400;
        }

        /* Form Alanları (Login ile aynı) */
        .form-group {
            width: 100%;
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 600;
            font-size: 15px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: #cbd5e1;
            box-shadow: 0 0 0 3px rgba(100, 116, 139, 0.1);
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        /* Onay Kutusu (Checkbox) Alanı */
        .checkbox-group {
            width: 100%;
            display: flex;
            align-items: flex-start;
            margin-top: 5px;
            margin-bottom: 25px;
        }

        .checkbox-group input[type="checkbox"] {
            margin-top: 3px;
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #22c55e; /* Yeşil renk */
        }

        .checkbox-group label {
            color: #64748b;
            font-size: 14px;
            line-height: 1.5;
            cursor: pointer;
        }

        /* Yeşil Kayıt Butonu */
        .btn-register {
            width: 100%;
            padding: 16px;
            background-color: #22c55e; /* image_8.png'deki yeşil renk */
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Roket Emojisi */
        .btn-register::after {
            content: ' 🚀';
            margin-left: 8px;
            font-size: 18px;
        }

        .btn-register:hover {
            background-color: #16a34a;
        }

        .btn-register:active {
            transform: scale(0.99);
        }

        /* Giriş Linki */
        .switch-page-text {
            margin-top: 30px;
            font-size: 14px;
            color: #64748b;
        }

        .switch-page-link {
            color: #1d4ed8;
            text-decoration: none;
            font-weight: 600;
        }

        .switch-page-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="brand-section">
            <div class="brand-logo">Yeni Hesap Oluştur</div>
            <div class="brand-slogan">Hemen katılın, emlak pazarındaki fırsatları kaçırmayın.</div>
        </div>

        <form id="registerForm" style="width: 100%;">
            <div class="form-group">
                <label for="username">Kullanıcı Adı</label>
                <input type="text" id="username" class="form-control" placeholder="Örn: muhammed_pazar" required>
            </div>

            <div class="form-group">
                <label for="email">E-posta Adresi</label>
                <input type="email" id="email" class="form-control" placeholder="isim@ornek.com" required>
            </div>

            <div class="form-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" class="form-control" placeholder="En az 6 karakter" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">Kullanım şartlarını ve gizlilik politikasını kabul ediyorum.</label>
            </div>

            <button type="submit" class="btn-register">Hesabımı Oluştur ve Başla</button>
        </form>

        <div class="switch-page-text">
          Zaten üye misiniz? <a href="/login" class="switch-page-link">Giriş Yapın</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            // Senin backend fetch kodların buraya gelecek
            alert('Backend enegrasyonu buraya yapılacak.');
        });
    </script>
</body>
</html>
