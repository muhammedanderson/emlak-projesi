<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisteme Güvenli Giriş Yap | EmlakPazar</title>
    <style>
        /* Genel Sıfırlama */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* Sayfa Arka Planı (Hafif Gradyan) */
        body {
            background: linear-gradient(135deg, #e0e6ed 0%, #f4f7f6 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Beyaz Kart Konteyneri */
        .card-container {
            background: #ffffff;
            padding: 45px 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo ve Başlık Alanı */
        .brand-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: #1e293b;
            /* Koyu renk */
            margin-bottom: 8px;
        }

        /* Örnek ev logosu */
        .brand-logo::before {
            content: '🏠';
            /* Ev emojisi */
            margin-right: 10px;
            font-size: 32px;
        }

        .brand-slogan {
            color: #64748b;
            /* Hafif gri */
            font-size: 14px;
            font-weight: 400;
        }

        /* Form Alanları */
        .form-group {
            width: 100%;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 600;
            font-size: 15px;
        }

        /* Input Alanı Stili */
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #ffffff;
            color: #1e293b;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }

        /* Focus Olduğunda Hafif Gölge */
        .form-control:focus {
            border-color: #cbd5e1;
            box-shadow: 0 0 0 3px rgba(100, 116, 139, 0.1);
        }

        /* Placeholder Rengi */
        .form-control::placeholder {
            color: #94a3b8;
        }

        /* Şifremi Unuttum Linki */
        .forgot-password-container {
            width: 100%;
            text-align: right;
            margin-top: -12px;
            margin-bottom: 25px;
        }

        .forgot-password-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password-link:hover {
            color: #64748b;
            text-decoration: underline;
        }

        /* Koyu Lacivert Giriş Butonu */
        .btn-login {
            width: 100%;
            padding: 16px;
            background-color: #1e293b;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Roket Emojisi Ekleme */
        .btn-login::after {
            content: ' 🚀';
            margin-left: 8px;
            font-size: 18px;
        }

        .btn-login:hover {
            background-color: #0f172a;
        }

        /* Butona Tıklama Efekti */
        .btn-login:active {
            transform: scale(0.99);
        }

        /* Alt Kısımdaki Kayıt Olma Linki */
        .switch-page-text {
            margin-top: 30px;
            font-size: 14px;
            color: #64748b;
        }

        .switch-page-link {
            color: #1d4ed8;
            /* Mavi link */
            text-decoration: none;
            font-weight: 600;
        }

        .switch-page-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="card-container">
        <div class="brand-section">
            <div class="brand-logo">EmlakPazar</div>
            <div class="brand-slogan">Emlak dünyasına açılan kurumsal kapınız.</div>
        </div>

        <form id="loginForm" style="width: 100%;">
            <div class="form-group">
                <label for="username">Kullanıcı Adı veya E-posta</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Örn: muhammed"
                    required>
            </div>

            <div class="form-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="********"
                    required>
            </div>

            <div class="forgot-password-container">
                <a href="/forgot-password" class="forgot-password-link">Şifremi Unuttum</a>
            </div>

            <button type="submit" class="btn-login">Sisteme Güvenli Giriş Yap</button>
        </form>

        <div class="switch-page-text">
            Henüz hesabınız yok mu? <a href="/register" class="switch-page-link">Hemen Kayıt Olun</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Sayfanın yenilenmesini engelle

            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;

            try {
                // authRoutes.js içindeki router.post('/login') endpoint'ine istek atıyoruz
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: usernameInput,
                        password: passwordInput
                    })
                });

                // Backend'den (authController.js) gelen JSON yanıtını alıyoruz
                const result = await response.json();

                if (response.ok) {
                    // Giriş başarılıysa kullanıcıyı yönlendir (örn: dashboard sayfasına)
                    // Eğer authController başarılı girişte redirect URL'i dönüyorsa onu kullanırız
                    window.location.href = result.redirectUrl || '/dashboard';
                } else {
                    // Giriş başarısızsa (Kullanıcı bulunamadı, şifre yanlış vb.) backend'deki hata mesajını gösterir
                    alert(result.message || 'Giriş işlemi başarısız oldu.');
                }

            } catch (error) {
                console.error('Bağlantı hatası:', error);
                alert('Sunucuyla iletişim kurulurken bir hata oluştu.');
            }
        });
    </script>
</body>

</html>
